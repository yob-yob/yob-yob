name: Update GitHub stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: update-github-stats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run generate:github-stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: yob-yob

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update github stats'
          file_pattern: static/data/github-stats.json
          skip_dirty_check: true
