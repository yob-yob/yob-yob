name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'static/data/github-stats.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          PUBLIC_OPENPANEL_CLIENT_ID: ${{ vars.PUBLIC_OPENPANEL_CLIENT_ID }}
          PUBLIC_OPENPANEL_API_URL: ${{ vars.PUBLIC_OPENPANEL_API_URL }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
